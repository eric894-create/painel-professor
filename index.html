<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Professor - IFSC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .canvas-grid { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(2, 320px) 180px; gap: 12px; }
        .block-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 2px solid transparent; background: white; }
        .block-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-color: rgba(0,0,0,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px); z-index: 50; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        textarea { border: 1px solid #e2e8f0; border-radius: 8px; width: 100%; padding: 12px; font-size: 0.9rem; outline: none; min-height: 120px; color: #475569; background: #f8fafc; }
        .sub-item { font-size: 11px; color: #94a3b8; padding-left: 36px; border-left: 1px solid #e2e8f0; margin-left: 22px; margin-top: 4px; }
        .student-item { transition: all 0.2s; cursor: pointer; border-radius: 12px; border: 1px solid transparent; }
        .student-item.active { background: #f1f5f9; border-left: 4px solid black; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">
    <aside class="w-80 bg-white border-r border-slate-200 p-6 flex flex-col hidden md:flex overflow-y-auto">
        <div class="flex items-center gap-2 mb-8">
            <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center text-white font-bold italic">P</div>
            <span class="font-extrabold text-xl tracking-tight text-slate-800 uppercase">Central Professor</span>
        </div>
        
        <div class="space-y-2 mb-6">
            <label class="w-full flex items-center justify-center gap-3 text-white font-bold bg-black hover:bg-slate-800 transition p-3 rounded-xl cursor-pointer shadow-lg text-xs uppercase">
                <i data-lucide="plus-circle" class="w-4 h-4"></i> Importar Alunos
                <input type="file" class="hidden" multiple onchange="importMultipleData(event)">
            </label>
            <button onclick="clearDatabase()" class="w-full text-[10px] text-rose-500 font-bold hover:underline uppercase tracking-widest text-center">Resetar Banco de Dados</button>
        </div>

        <nav class="space-y-4 mb-8 flex-1 overflow-y-auto">
            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Turma Carregada</div>
            <div id="student-list" class="space-y-1"></div>
        </nav>

        <div class="mt-auto pt-6 border-t space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1">Nota Extra (Apresentação)</label>
                <input type="number" id="extra-score" min="0" max="10" value="0" oninput="saveCurrentData()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2 text-center font-bold text-lg outline-none focus:border-black">
            </div>
            <button onclick="exportSingleResult()" class="w-full flex items-center justify-center gap-3 text-white font-bold bg-emerald-600 hover:bg-emerald-700 transition p-4 rounded-xl shadow-lg uppercase text-xs">
                <i data-lucide="download" class="w-4 h-4"></i> Exportar Nota
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-8 relative">
        <header id="header-area" class="mb-8 border-b border-slate-200 pb-6 flex justify-between items-start hidden">
            <div>
                <h2 class="text-3xl font-extrabold text-slate-900 uppercase">Avaliando: <span id="display-aluno-nome"></span></h2>
                <p class="text-slate-500 text-sm italic">Atribua notas de 0 a 10 em cada bloco colorido.</p>
            </div>
            <div class="text-right bg-white p-4 rounded-2xl border border-slate-200 shadow-sm min-w-[140px]">
                <p class="text-[10px] font-bold text-black uppercase tracking-widest mb-1">Nota Final</p>
                <p id="total-score" class="text-4xl font-black text-black leading-none">0</p>
                <p class="text-[9px] text-slate-400 mt-2 uppercase font-bold tracking-tighter">Escala 0 a 100</p>
            </div>
        </header>

        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-400">
            <i data-lucide="users" class="w-16 h-16 mb-4"></i>
            <p class="font-bold uppercase text-xs tracking-widest">Selecione um aluno para começar</p>
        </div>

        <div class="canvas-grid hidden" id="main-grid"></div>
    </main>

    <div id="modal" class="modal" onclick="if(event.target == this) closeModal()">
        <div class="bg-white rounded-3xl w-full max-w-3xl shadow-2xl overflow-hidden">
            <div id="modal-header" class="p-6 text-white flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i id="modal-icon" class="w-6 h-6"></i>
                    <h3 id="modal-title" class="text-xl font-bold uppercase">Título</h3>
                </div>
                <button onclick="closeModal()" class="hover:bg-white/20 p-2 rounded-full transition"><i data-lucide="x"></i></button>
            </div>
            <div id="modal-body" class="p-8 space-y-6 max-h-[50vh] overflow-y-auto"></div>
            
            <div class="p-6 bg-slate-50 border-t flex items-center justify-between px-10">
                <div class="flex items-center gap-4">
                    <label class="text-xs font-bold text-slate-700 uppercase">Nota do Bloco (0-10):</label>
                    <input type="number" id="block-score-input" min="0" max="10" class="w-20 p-2 border-2 border-black rounded-lg text-center font-bold text-xl outline-none">
                </div>
                <button onclick="closeModal()" class="bg-black text-white px-12 py-3 rounded-xl font-bold uppercase text-sm tracking-wide">Salvar Nota</button>
            </div>
        </div>
    </div>

    <script>
        const CORES = { azul: "bg-blue-600", verde: "bg-emerald-500", rosa: "bg-rose-500", laranja: "bg-amber-500" };
        const DATA_STRUCTURE = [
            { id: "key_partnerships", label: "Parcerias", icon: "handshake", color: CORES.azul, col: "span 2", row: "1 / span 2", subs: ["Parceiros Estratégicos", "Fornecedores-Chave"] },
            { id: "key_activities", label: "Atividades", icon: "cog", color: CORES.azul, col: "span 2", row: "1", subs: ["Produção e Operações", "Marketing e Vendas"] },
            { id: "key_resources", label: "Recursos", icon: "box", color: CORES.azul, col: "span 2", row: "2", subs: ["Físicos", "Intelectuais", "Humanos"] },
            { id: "value_proposition", label: "Proposta de Valor", icon: "lightbulb", color: CORES.rosa, col: "span 2", row: "1 / span 2", subs: ["Problema Identificado", "Solução Proposta", "Diferenciais Competitivos"] },
            { id: "relationships", label: "Relacionamento", icon: "heart", color: CORES.verde, col: "span 2", row: "1", subs: ["Conquista e Manutenção", "Fidelização Pós-Compra"] },
            { id: "channels", label: "Canais", icon: "megaphone", color: CORES.verde, col: "span 2", row: "2", subs: ["Distribuição", "Comunicação e Divulgação"] },
            { id: "customer_segments", label: "Segmentos", icon: "users", color: CORES.verde, col: "span 2", row: "1 / span 2", subs: ["Público-Alvo", "Necessidades e Dores", "Perfil Comportamental"] },
            { id: "cost_structure", label: "Custos", icon: "wallet", color: CORES.laranja, col: "span 5", row: "3", subs: ["Custos Fixos", "Custos Variáveis"] },
            { id: "revenue_streams", label: "Receitas", icon: "dollar-sign", color: CORES.laranja, col: "span 5", row: "3", subs: ["Modelo de Receita", "Estratégia de Preços"] }
        ];

        let database = JSON.parse(localStorage.getItem('PROF_IFSC_DB') || '{}');
        let currentStudentId = null;
        let currentBlockId = null;

        function importMultipleData(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const data = JSON.parse(ev.target.result);
                    const id = "ID_" + data.aluno.toUpperCase().replace(/\s+/g, '_');
                    if (!database[id]) {
                        database[id] = { nome: data.aluno, trabalho: data.trabalho, notas: {}, extra: 0 };
                        saveDB();
                    }
                };
                reader.readAsText(file);
            });
        }

        function saveDB() {
            localStorage.setItem('PROF_IFSC_DB', JSON.stringify(database));
            renderStudentList();
        }

        function renderStudentList() {
            const list = document.getElementById('student-list');
            list.innerHTML = '';
            Object.keys(database).forEach(id => {
                const item = document.createElement('div');
                item.className = `student-item p-3 mb-1 font-bold text-xs flex justify-between items-center ${currentStudentId === id ? 'active' : 'hover:bg-slate-50'}`;
                item.innerHTML = `<div onclick="selectStudent('${id}')" class="flex-1">${database[id].nome}</div><button onclick="deleteStudent('${id}')" class="text-slate-300 hover:text-rose-500 ml-2"><i data-lucide="trash-2" class="w-3 h-3"></i></button>`;
                list.appendChild(item);
            });
            lucide.createIcons();
        }

        function selectStudent(id) {
            currentStudentId = id;
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('header-area').classList.remove('hidden');
            document.getElementById('main-grid').classList.remove('hidden');
            document.getElementById('display-aluno-nome').innerText = database[id].nome;
            document.getElementById('extra-score').value = database[id].extra || 0;
            renderGrid();
            renderStudentList();
        }

        function renderGrid() {
            const grid = document.getElementById('main-grid');
            if (!currentStudentId) return;
            const s = database[currentStudentId];
            grid.innerHTML = '';
            DATA_STRUCTURE.forEach(b => {
                const score = s.notas[b.id] || 0;
                const card = document.createElement('div');
                card.className = `block-card rounded-2xl p-6 flex flex-col border-t-8 ${b.color.replace('bg-', 'border-')}`;
                card.style.gridColumn = b.col; card.style.gridRow = b.row;
                card.onclick = () => openModal(b);
                card.innerHTML = `<div class="flex items-center justify-between mb-4"><div class="p-2 rounded-lg ${b.color} text-white shadow-lg"><i data-lucide="${b.icon}" class="w-4 h-4"></i></div><span class="text-[10px] font-black px-2 py-1 bg-black text-white rounded">NOTA: ${score}</span></div><h4 class="font-extrabold text-sm text-slate-800 uppercase tracking-tight">${b.label}</h4><div class="text-[10px] text-slate-400 mt-2 space-y-1">${b.subs.map(sub => `<div>• ${sub}</div>`).join('')}</div>`;
                grid.appendChild(card);
            });
            lucide.createIcons();
            updateTotal();
        }

        function openModal(b) {
            currentBlockId = b.id;
            const s = database[currentStudentId];
            document.getElementById('modal-title').innerText = b.label;
            document.getElementById('modal-header').className = `p-6 text-white flex justify-between items-center ${b.color}`;
            document.getElementById('block-score-input').value = s.notas[b.id] || 0;
            let html = '';
            b.subs.forEach(sub => {
                const val = s.trabalho[`${b.id}_${sub}`] || s.trabalho[sub] || 'Não preenchido';
                html += `<div><label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">${sub}</label><textarea readonly>${val}</textarea></div>`;
            });
            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            if (currentStudentId && currentBlockId) {
                database[currentStudentId].notas[currentBlockId] = parseInt(document.getElementById('block-score-input').value) || 0;
                saveDB();
            }
            document.getElementById('modal').classList.remove('active');
            renderGrid();
        }

        function saveCurrentData() {
            if (currentStudentId) {
                database[currentStudentId].extra = parseInt(document.getElementById('extra-score').value) || 0;
                saveDB();
                updateTotal();
            }
        }

        function updateTotal() {
            if (!currentStudentId) return;
            let total = database[currentStudentId].extra || 0;
            DATA_STRUCTURE.forEach(b => { total += (database[currentStudentId].notas[b.id] || 0); });
            document.getElementById('total-score').innerText = total;
        }

        function deleteStudent(id) { if (confirm("Remover aluno da lista?")) { delete database[id]; if (currentStudentId === id) location.reload(); saveDB(); } }
        function clearDatabase() { if (confirm("AVISO: Isso apagará TODOS os dados da central. Continuar?")) { localStorage.removeItem('PROF_IFSC_DB'); location.reload(); } }

        function exportSingleResult() {
            if (!currentStudentId) return;
            const s = database[currentStudentId];
            const data = { aluno: s.nome, notaFinal: document.getElementById('total-score').innerText, data: new Date().toLocaleDateString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Nota_${s.nome}.json`; a.click();
        }

        renderStudentList();
    </script>
</body>
</html>
